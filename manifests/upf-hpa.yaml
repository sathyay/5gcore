# manifests/upf-hpa.yaml
# Auto-scales UPF replicas when load exceeds 80%.
# Uses CPU as the baseline metric (works with stock metrics-server, no
# extra adapter needed). For true throughput-based scaling, swap the
# metric to a custom Prometheus metric (e.g. upf_throughput_mbps) via
# the prometheus-adapter — flagged as an enhancement, not required for
# the initial demo.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oai-upf-hpa
  namespace: oai5g
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oai-upf
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---

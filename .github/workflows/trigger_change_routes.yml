name: Change 5G Routes

on:
  workflow_dispatch:

jobs:
  change-route:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Run Change Route Playbook
        run: |
          ansible-playbook playbooks/change_routes.yml
# .github/workflows/slice-provisioning.yml
name: 5G Slice Provisioning

on:
  push:
    branches: [main]
    paths:
      - 'slices/**.yaml'    # only triggers on slice config changes

env:
  NAMESPACE: oai5g
  KUBECONFIG_SECRET: AKS_KUBECONFIG

jobs:

  # ─────────────────────────────────────────
  validate:
    name: Validate Slice Config
    runs-on: ubuntu-latest
    outputs:
      slice_file: ${{ steps.detect.outputs.slice_file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed slice file
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'slices/*.yaml')
          echo "Changed file: $CHANGED"
          echo "slice_file=$CHANGED" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate slice config schema
        run: |
          python scripts/validate_slice.py ${{ steps.detect.outputs.slice_file }}

  # ─────────────────────────────────────────
  provision:
    name: Provision Slice on AKS
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install pyyaml kubernetes jinja2

      - name: Patch AMF configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target amf

      - name: Patch SMF configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target smf

      - name: Patch gNB configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target gnb

      - name: Rolling restart NFs
        run: |
          kubectl rollout restart deployment/oai-amf -n $NAMESPACE
          kubectl rollout restart deployment/oai-smf -n $NAMESPACE
          kubectl rollout restart deployment/oai-gnb -n $NAMESPACE

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/oai-amf -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/oai-smf -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/oai-gnb -n $NAMESPACE --timeout=120s

  # ─────────────────────────────────────────
  verify:
    name: Verify Slice End-to-End
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - uses: actions/checkout@v4

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install pyyaml kubernetes

      - name: Run verification checks
        run: |
          python scripts/verify_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }}

  # ─────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: failure()
    steps:
      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Rollback all NFs
        run: |
          kubectl rollout undo deployment/oai-amf -n $NAMESPACE
          kubectl rollout undo deployment/oai-smf -n $NAMESPACE
          kubectl rollout undo deployment/oai-gnb -n $NAMESPACE
          echo "❌ Slice provisioning failed — rolled back all NFs"

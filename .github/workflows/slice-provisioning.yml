name: 5G Network Slice Provisioning

# ─────────────────────────────────────────────────────────────
# TRIGGER: Fires when any file inside slices/ folder is changed
# Engineer commits a new slice YAML → pipeline auto-runs
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'slices/**.yaml'
  workflow_dispatch:
    inputs:
      slice_file:
        description: 'Slice file to provision (e.g. slices/slice-iot.yaml)'
        required: true

env:
  NAMESPACE: oai5g

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1: VALIDATE
  # Checks the slice YAML is correct before touching AKS
  # Fails fast — no cluster changes if config is invalid
  # ════════════════════════════════════════════════════════════
  validate:
    name: "Job 1 — Validate Slice Config"
    runs-on: self-hosted
    outputs:
      slice_file: ${{ steps.detect.outputs.slice_file }}
      slice_name: ${{ steps.detect.outputs.slice_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed slice file
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLICE_FILE="${{ github.event.inputs.slice_file }}"
          else
            SLICE_FILE=$(git diff --name-only HEAD~1 HEAD -- 'slices/*.yaml' | head -1)
          fi
          SLICE_NAME=$(basename $SLICE_FILE .yaml)
          echo "Detected slice file: $SLICE_FILE"
          echo "slice_file=$SLICE_FILE" >> $GITHUB_OUTPUT
          echo "slice_name=$SLICE_NAME" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate slice config schema
        run: python scripts/validate_slice.py ${{ steps.detect.outputs.slice_file }}

  # ════════════════════════════════════════════════════════════
  # JOB 2: PROVISION
  # Patches AMF, SMF, gNB configmaps with new slice config
  # Restarts NFs to apply changes
  # Only runs if Job 1 (validate) passes
  # ════════════════════════════════════════════════════════════
  provision:
    name: "Job 2 — Provision Slice on AKS"
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install pyyaml kubernetes jinja2

      - name: Patch AMF configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target amf

      - name: Patch SMF configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target smf

      - name: Patch gNB configmap
        run: |
          python scripts/provision_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }} \
            --target gnb

      - name: Rolling restart AMF
        run: |
          kubectl rollout restart deployment/oai-amf -n $NAMESPACE
          kubectl rollout status deployment/oai-amf -n $NAMESPACE --timeout=120s

      - name: Rolling restart SMF
        run: |
          kubectl rollout restart deployment/oai-smf -n $NAMESPACE
          kubectl rollout status deployment/oai-smf -n $NAMESPACE --timeout=120s

      - name: Rolling restart gNB
        run: |
          kubectl rollout restart deployment/oai-gnb -n $NAMESPACE
          kubectl rollout status deployment/oai-gnb -n $NAMESPACE --timeout=120s

  # ════════════════════════════════════════════════════════════
  # JOB 3: VERIFY
  # Runs end-to-end checks after provisioning
  # Confirms: pods running, NGAP up, slice registered in AMF
  # Only runs if Job 2 (provision) passes
  # ════════════════════════════════════════════════════════════
  verify:
    name: "Job 3 — Verify Slice End-to-End"
    runs-on: ubuntu-latest
    needs: [validate, provision]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install pyyaml kubernetes

      - name: Run verification checks
        run: |
          python scripts/verify_slice.py \
            --slice ${{ needs.validate.outputs.slice_file }}

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slice-verification-${{ needs.validate.outputs.slice_name }}
          path: verify_report.txt

  # ════════════════════════════════════════════════════════════
  # JOB 4: ROLLBACK
  # Only runs if Job 2 or Job 3 FAILS
  # Automatically undoes all NF changes
  # Prevents broken config staying in cluster
  # ════════════════════════════════════════════════════════════
  rollback:
    name: "Job 4 — Rollback on Failure"
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: failure()

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Rollback AMF
        run: kubectl rollout undo deployment/oai-amf -n $NAMESPACE

      - name: Rollback SMF
        run: kubectl rollout undo deployment/oai-smf -n $NAMESPACE

      - name: Rollback gNB
        run: kubectl rollout undo deployment/oai-gnb -n $NAMESPACE

      - name: Notify rollback
        run: |
          echo "❌ Slice provisioning FAILED — all NFs rolled back"
          echo "Check pipeline logs for details"

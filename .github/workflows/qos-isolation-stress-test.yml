name: QoS Isolation Stress Test

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'   # periodic regression run

env:
  NAMESPACE: oai5g

jobs:

  stress-test:
    name: Generate Congestion + Verify Isolation
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install pyyaml kubernetes requests

      # ── Step 1: Confirm both slices are healthy before stressing ──
      - name: Baseline — verify IoT slice
        run: python scripts/verify_slice.py --slice slices/slice-iot.yaml

      - name: Baseline — verify Enterprise slice
        run: python scripts/verify_slice.py --slice slices/slice-enterprise.yaml

      # ── Step 2: Apply per-slice QoS shaping on UPF pods ───────────
      - name: Apply QoS shaping — IoT slice
        run: python scripts/apply_qos_shaping.py --slice slices/slice-iot.yaml

      - name: Apply QoS shaping — Enterprise slice
        run: python scripts/apply_qos_shaping.py --slice slices/slice-enterprise.yaml

      # ── Step 3+4: Generate congestion from both UEs concurrently ──
      - name: Generate congestion
        run: python scripts/generate_congestion.py --duration 60

      # ── Step 5+6: Verify isolation + autoscale, write report ──────
      - name: Verify isolation + check autoscale
        id: isolation
        run: python scripts/stress_test_isolation.py
        continue-on-error: true   # always publish dashboard even on failure

      # ── Step 7: Push metrics to Grafana via Pushgateway ───────────
      # - name: Publish metrics to dashboard
      #   if: always()
      #   run: |
      #     python scripts/publish_metrics.py \
      #       --report isolation_report.json \
      #       --gateway ${{ secrets.PUSHGATEWAY_URL }}

      # ── Teardown: shaping already removed inside stress_test_isolation.py ──

      # ── Upload report artifact ─────────────────────────────────────
      - name: Upload isolation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qos-isolation-report
          path: isolation_report.json

      # ── Fail the pipeline cleanly if isolation was violated ────────
      - name: Fail if isolation violated
        if: steps.isolation.outcome == 'failure'
        run: |
          echo "❌ Isolation check FAILED — see isolation_report.json artifact"
          exit 1
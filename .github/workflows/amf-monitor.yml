name: AMF Registration Monitor

on:
  #schedule:
  #  - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-amf-registration:
    name: Check gNB-AMF Registration
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AKS credentials
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install pyyaml

      - name: Run AMF registration check
        run: python scripts/check_amf_registration.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amf-registration-report
          path: amf_report.txt

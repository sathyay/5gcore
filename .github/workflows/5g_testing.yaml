name: oai-5g-testcase-scenarios

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# =========================
# SHARED SETUP JOB
# =========================
jobs:

  setup:
    name: Setup NetDevOps Environment
    runs-on: self-hosted

    outputs:
      kubeconfig_path: ${{ steps.kube.outputs.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install core dependencies (pyATS + kubectl libs)
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml \
            kubernetes \
            pyats \
            genie

      - name: Setup kubeconfig
        id: kube
        run: |
          echo "${{ secrets.AKS_KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV
          echo "path=$PWD/kubeconfig" >> $GITHUB_OUTPUT

      - name: Validate cluster access
        run: kubectl get nodes


# =========================
# STAGE 1 - PARALLEL HEALTH CHECKS
# =========================

#  k8s-health:
#    name: Kubernetes Health Check
#    runs-on: self-hosted
#    needs: setup

#    steps:
#      - uses: actions/checkout@v4
#      - run: kubectl get pods -A
#      - run: python scripts/check_k8s_health.py


  dns-check:
    name: DNS Validation
    runs-on: self-hosted
    needs: setup

    steps:
      - uses: actions/checkout@v4
      
      - name: Run DNS check
        run: python scripts/check_dns.py


# =========================
# STAGE 2 - NGAP + AMF FLOW
# =========================

  ngap-validation:
    name: NGAP Validation
    runs-on: self-hosted
    needs: dns-check

    steps:
      - uses: actions/checkout@v4
      - run: python scripts/check_ngap.py


  amf-registration:
    name: AMF Registration Check
    runs-on: self-hosted
    needs: ngap-validation

    steps:
      - uses: actions/checkout@v4
      - run: python scripts/check_amf_registration.py


# =========================
# STAGE 3 - UE ATTACH FLOW
# =========================

  ue-attach:
    name: UE Attach Validation
    runs-on: self-hosted
    needs: amf-registration

    steps:
      - uses: actions/checkout@v4
      - run: python scripts/check_ue_attach.py


# =========================
# FINAL REPORTING
# =========================

  report:
    name: Generate Validation Report
    runs-on: self-hosted
    needs: ue-attach
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Collect reports
        run: |
          echo "Collecting reports..."
          ls -ltr scripts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oai-5g-validation-report
          path: |
            amf_report.txt
            ue_report.txt
            ngap_report.txt
